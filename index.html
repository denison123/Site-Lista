<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Supermercado</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Lista de Supermercado 📝</h1>

    <form id="form-adicionar">
        <input type="text" id="item-nome" placeholder="Nome do Item" required>
        <input type="number" id="item-quantidade" placeholder="Qtd" min="1" required>
        <input type="number" id="item-valor" placeholder="Valor Unitário (R$)" min="0.01" step="0.01" required>
        <button type="submit">Adicionar</button>
    </form>
    
    <hr>

    <table id="lista-itens">
        <thead>
            <tr>
                <th>Comprado</th>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Valor Unit. (R$)</th>
                <th>Total (R$)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <hr>

    <div id="total-container">
        Total Estimado: <span id="valor-total">R$ 0.00</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
